services:
  postgres:
    image: postgres:16-alpine
    container_name: logistica-postgres
    environment:
      POSTGRES_USER: logistica
      POSTGRES_PASSWORD: logistica123
      POSTGRES_DB: tracking_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistica"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: logistica-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: logistica
      RABBITMQ_DEFAULT_PASS: logistica123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  tracking-service:
    build:
      context: ./tracking-service
      dockerfile: Dockerfile
    container_name: logistica-tracking
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://logistica:logistica123@postgres:5432/tracking_db
      RABBITMQ_URL: amqp://logistica:logistica123@rabbitmq:5672/
      SERVICE_NAME: tracking-service
      RABBITMQ_CONNECTION_TIMEOUT: "10"
      RABBITMQ_HEARTBEAT: "60"
      HTTP_TIMEOUT_SECONDS: "30"
      DB_POOL_SIZE: "10"
      DB_POOL_TIMEOUT: "30"
      DB_POOL_RECYCLE: "1800"
      PROMETHEUS_PORT: "8001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: logistica-notification
    environment:
      DATABASE_URL: postgresql://logistica:logistica123@postgres:5432/notification_db
      RABBITMQ_URL: amqp://logistica:logistica123@rabbitmq:5672/
      SERVICE_NAME: notification-service
      RABBITMQ_CONNECTION_TIMEOUT: "10"
      RABBITMQ_HEARTBEAT: "60"
      DB_POOL_SIZE: "5"
      DB_POOL_TIMEOUT: "30"
      DB_POOL_RECYCLE: "1800"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  route-service:
    build:
      context: ./route-service
      dockerfile: Dockerfile
    container_name: logistica-route
    environment:
      DATABASE_URL: postgresql://logistica:logistica123@postgres:5432/route_db
      RABBITMQ_URL: amqp://logistica:logistica123@rabbitmq:5672/
      SERVICE_NAME: route-service
      RABBITMQ_CONNECTION_TIMEOUT: "10"
      RABBITMQ_HEARTBEAT: "60"
      DB_POOL_SIZE: "5"
      DB_POOL_TIMEOUT: "30"
      DB_POOL_RECYCLE: "1800"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: logistica-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - tracking-service

  grafana:
    image: grafana/grafana:latest
    container_name: logistica-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: logistica123
    volumes:
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infrastructure/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
